<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="css/utils.css">
</head>
<body>
<header>
  <div class="header-left">
    <button class="games-btn" id="gamesBtn">Games</button>
    <div class="games-dropdown" id="gamesDropdown"></div>
  </div>
  <div class="header-right">
    <select class="locale-select" id="localeSelect">
      <option value="en">English</option>
      <option value="zh">中文</option>
    </select>
    <button class="help-btn" id="helpBtn">?</button>
    <div class="help-dropdown" id="helpDropdown">
      <h3 id="helpTitle">How to Play</h3>
      <p id="helpText">Loading...</p>
    </div>
  </div>
</header>
<main>
  <div class="board" id="board"></div>
</main>
<script src="js/utils.js"></script>
</body>
</html>
